# Monitor Rules
# monitorrule=name:eDP-1,width:1920,height:1080,refresh:60,x:0,y:10,scale:1,vrr:0,rr:0

# =========================================
# Monitors
# =========================================

# Left monitor
monitorrule=name:^HDMI-A-1$,width:1920,height:1080,refresh:60,x:0,y:0,scale:1,rr:0,vrr:0

# Center monitor
monitorrule=name:^HDMI-A-2$,width:1920,height:1080,refresh:60,x:1920,y:0,scale:1,rr:0,vrr:0

# Right vertical monitor
monitorrule=name:^DP-2$,width:1080,height:1920,refresh:60,x:3840,y:0,scale:1,rr:1,vrr:0
