# reload config
bind=SUPER,r,spawn_shell,bash ~/.config/mango/scripts/config_check.sh
bind=SUPER,r,reload_config

# menu and terminal and exit
bind=SUPER,Return,spawn,kitty
bind=SUPER,space,spawn,fuzzel
bind=SUPER,ESCAPE,quit
bind=SUPER,q,killclient,

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=ALT,Tab,focuslast
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# swap window
bind=SUPER+CTRL,Up,exchange_client,up
bind=SUPER+CTRL,Down,exchange_client,down
bind=SUPER+CTRL,Left,exchange_client,left
bind=SUPER+CTRL,Right,exchange_client,right

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0


# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# switch window status
bind=SUPER,g,toggleglobal,
bind=SUPER,o,toggleoverview,0
bind=ALT,backslash,togglefloating,
bind=SUPER,f,togglemaximizescreen,
bind=SUPER+SHIFT,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,
bind=ALT,x,switch_proportion_preset,prev
bind=alt+super+ctrl,Left,scroller_stack,left
bind=alt+super+ctrl,Right,scroller_stack,right
bind=alt+super+ctrl,Up,scroller_stack,up
bind=alt+super+ctrl,Down,scroller_stack,down

#dwindle layout
bind=alt+shift,Return,dwindle_toggle_split_direction

# tile layout
bind=SUPER,e,incnmaster,1
bind=SUPER,t,incnmaster,-1
bind=ALT,s,zoom,

# switch layout
bind=CTRL+SUPER,i,setlayout,tile
bind=CTRL+SUPER,l,setlayout,scroller
bind=SUPER,n,switch_layout

bind=SUPER+ALT,1,setlayout,tile
bind=SUPER+ALT,2,setlayout,scroller
bind=SUPER+ALT,3,setlayout,monocle
bind=SUPER+ALT,4,setlayout,grid
bind=SUPER+ALT,5,setlayout,deck
bind=SUPER+ALT,6,setlayout,center_tile
bind=SUPER+ALT,7,setlayout,vertical_tile
bind=SUPER+ALT,8,setlayout,right_tile
bind=SUPER+ALT,9,setlayout,dwindle
bind=SUPER+ALT,0,setlayout,fair

# tag switch
#bind=SUPER,Left,viewtoleft,0
bind=CTRL,Left,viewtoleft_have_client,0
#bind=SUPER,Right,viewtoright,0
bind=CTRL,Right,viewtoright_have_client,0


bind=Super,1,view,1,0
bind=Super,2,view,2,0
bind=Super,3,view,3,0
bind=Super,4,view,4,0
bind=Super,5,view,5,0
bind=Super,6,view,6,0
bind=Super,7,view,7,0
bind=Super,8,view,8,0
bind=Super,9,view,9,0

bind=Alt,1,tag,1,0
bind=Alt,2,tag,2,0
bind=Alt,3,tag,3,0
bind=Alt,4,tag,4,0
bind=Alt,5,tag,5,0
bind=Alt,6,tag,6,0
bind=Alt,7,tag,7,0
bind=Alt,8,tag,8,0
bind=Alt,9,tag,9,0

bind=ctrl+Super,1,toggletag,1
bind=ctrl+Super,2,toggletag,2
bind=ctrl+Super,3,toggletag,3
bind=ctrl+Super,4,toggletag,4
bind=ctrl+Super,5,toggletag,5
bind=ctrl+Super,6,toggletag,6
bind=ctrl+Super,7,toggletag,7
bind=ctrl+Super,8,toggletag,8
bind=ctrl+Super,9,toggletag,9

bind=Ctrl,1,toggleview,1
bind=Ctrl,2,toggleview,2
bind=Ctrl,3,toggleview,3
bind=Ctrl,4,toggleview,4
bind=Ctrl,5,toggleview,5
bind=Ctrl,6,toggleview,6
bind=Ctrl,7,toggleview,7
bind=Ctrl,8,toggleview,8
bind=Ctrl,9,toggleview,9


# monitor switch
bind=super+shift,Left,focusmon,left
bind=super+shift,Right,focusmon,right
bind=super+shift,Up,focusmon,up
bind=super+shift,Down,focusmon,down
bind=SUPER+ALT,Left,tagmon,left
bind=SUPER+ALT,Right,tagmon,right
bind=SUPER+ALT,Up,tagmon,up
bind=SUPER+ALT,Down,tagmon,down

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps


# Mouse Button Bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=alt,btn_middle,set_proportion,0.5
mousebind=SUPER,btn_right,moveresize,curresize



#Custom Bindings
bind=SUPER,p,spawn_shell,cliphist list | fuzzel --dmenu | cliphist decode | wl-copy
bind=Alt,n,spawn,nautilus
bind=SUPER,z,spawn,zen-browser
bind=ALT,v,spawn,vesktop
bind=Alt,e,spawn,flatpak run com.tomjwatson.Emote 
bind=Alt,b,spawn,vivaldi-stable


# =========================================
# Screenshots (niri-like)
# =========================================

bind=NONE,Print,spawn_shell,~/.config/mango/scripts/screenshot.sh area
bind=CTRL,Print,spawn_shell,~/.config/mango/scripts/screenshot.sh screen
bind=ALT,Print,spawn_shell,~/.config/mango/scripts/screenshot.sh window

